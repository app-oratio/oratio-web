<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página não encontrada | Oratio</title>

  <!-- CSS global -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- CSS específico -->
  <link rel="stylesheet" href="/css/erro-404.css">
</head>
<body>

  <main class="erro-container">

    <!-- TOPO -->
    <div class="erro-topo">
      <img src="/icons/logo/logo-white.png" alt="Oratio" class="erro-logo">
    </div>

    <!-- CONTEÚDO -->
    <section class="erro-conteudo">
      <h1 class="erro-codigo">404</h1>
      <h2 class="erro-titulo">Página não encontrada</h2>

      <p class="erro-texto">
        A página que você tentou acessar não está disponível no momento ou foi removida. 
        Você pode retornar à página inicial ou utilizar a busca para encontrar o conteúdo desejado.
      </p>

      <div class="erro-acoes">
        <a href="/" class="btn btn-primary">Tela inicial</a>
        <a href="/buscar" class="btn btn-outline">Buscar</a>
      </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="erro-footer">
      <div class="footer-titulo">Oratio</div>
      <div class="footer-lema">"Que Seu Nome não se afaste dos seus lábios"</div>
    </footer>

  </main>

</body>
  </html>
